openapi: 3.0.3
info:
  title: Android SMS Gateway Forwarding API
  version: 1.0.0
  description: |
    Documentation for the endpoints that the Android SMS Gateway application calls to forward received SMS messages.
    
    The application supports two streams for forwarding SMS:
    1. **Primary Receiver (Stream A)**: Encrypted forwarding with filtering capabilities.
    2. **Backup Receiver (Stream B)**: Raw forwarding of all messages without filters or encryption.

servers:
  - url: https://your-server.com/api
    description: Example server URL

paths:
  /sms/send:
    post:
      summary: Send SMS or Initiate USSD (Server to App)
      description: |
        Triggers the Android device to send an SMS message OR initiate a USSD session via Firebase Cloud Messaging (FCM).
        This endpoint is handled by `backend/index.php` on the server, which forwards the request to the device.
        
        **Functionality:**
        1. **Send SMS**: Set `to` to a phone number and `text` to the message body.
        2. **Initiate USSD**: Set `to` to a USSD code (e.g., `*888#`). The `text` field is ignored.
        
        **Key Files:**
        - **Server**: `backend/index.php` (Handles request, forwards to FCM)
        - **App (Config)**: `app/src/main/java/com/ibnux/smsgateway/Aplikasi.java` (Generates "Your Secret")
        - **App (Receiver)**: `app/src/main/java/com/ibnux/smsgateway/layanan/PushService.java` (Receives FCM payload, handles SMS sending and queues USSD requests)
        
        **Authentication:**
        The `secret` parameter must match the "Your Secret" generated by the app in `Aplikasi.java`.
      operationId: sendSmsFromDevice
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - to
                - text
                - secret
                - deviceID
              properties:
                to:
                  type: string
                  description: Destination phone number OR USSD code (e.g., "*888#").
                text:
                  type: string
                  description: Message content (ignored for USSD).
                secret:
                  type: string
                  description: The "Your Secret" key displayed in the Android App (generated in `Aplikasi.java`).
                deviceID:
                  type: string
                  description: The FCM Token ("Your Device ID") displayed in the Android App.
                sim:
                  type: integer
                  description: SIM slot to use (0, 1, or 2).
                  default: 0
                time:
                  type: string
                  description: Timestamp (optional, required if using MD5 signature logic).
      responses:
        '200':
          description: Request processed (sent to FCM).
          content:
            text/plain:
              schema:
                type: string
                example: "{"name":"projects/..."}"

  /sms/receive:
    post:
      summary: Primary Receiver Endpoint (Stream A)
      description: |
        Receives filtered SMS messages. The format depends on the "Enable Encryption" setting in the app.
        
        **Key Files:**
        - **Trigger (SMS)**: `app/src/main/java/com/ibnux/smsgateway/layanan/SmsListener.java` (Captures SMS, applies filters, initiates upload)
        - **Encryption**: `app/src/main/java/com/ibnux/smsgateway/Utils/SecurityUtil.java` (Encrypts payload using AES-GCM)
        - **Signing**: `app/src/main/java/com/ibnux/smsgateway/layanan/PostQueueManager.java` (Adds HMAC-SHA256 signature header)
        
        **Mode 1: Encryption Enabled (Default)**
        - **Payload**: JSON Object with `is_encrypted: true` and a `payload` string.
        - **Encryption Algorithm**: AES/GCM/NoPadding (256-bit Key).
        - **Format**: Base64(IV + CipherText + Tag).
        
        **Mode 2: Encryption Disabled**
        - **Payload**: JSON Object with `is_encrypted: false` and raw message fields (`from`, `message`, etc.).
        
        **HMAC-SHA256 Signature (Optional)**
        - When "Enable HMAC Signing" is toggled on in the Android app, every POST request includes an `X-Signature` header.
        - **Algorithm**: HMAC-SHA256 using a 256-bit key.
        - **Header**: `X-Signature: <Base64-encoded HMAC-SHA256 digest of the raw request body>`
        - **Verification**: The backend recomputes the HMAC using its configured key and compares with `hash_equals()`. A mismatch returns 403 Forbidden.
        - **Backward Compatible**: When HMAC signing is disabled on the app, no header is sent and the backend processes requests normally (when `$hmac_signing_enabled` is `false`).
      operationId: receivePrimarySms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/EncryptedPayload'
                - $ref: '#/components/schemas/UnencryptedPayload'
            examples:
              encrypted-with-signature:
                summary: Encrypted payload with HMAC-SHA256 signature
                value:
                  is_encrypted: true
                  payload: "VGhpcyBpcyBhbiBleGFtcGxlIGVuY3J5cHRlZCBwYXlsb2Fk..."
              unencrypted-with-signature:
                summary: Unencrypted payload with HMAC-SHA256 signature
                value:
                  is_encrypted: false
                  from: "+1234567890"
                  message: "Hello World"
                  type: "received"
                  timestamp: "1678886400000"
      responses:
        '200':
          description: Message received successfully
        '400':
          description: Bad Request
        '403':
          description: Forbidden — HMAC signature verification failed (X-Signature missing or invalid)
        '500':
          description: Server Error
      headers:
        X-Signature:
          description: HMAC-SHA256 signature of the raw request body (Base64). Required when HMAC signing is enabled.
          schema:
            type: string
          example: "dGhpcyBpcyBhIGJhc2U2NCBzaWduYXR1cmUgZXhhbXBsZQ=="

  /sms/ussd:
    post:
      summary: USSD Receiver Endpoint
      description: |
        Receives USSD responses (e.g., balance check results) from the device.
        This endpoint is separate from the SMS receiver and typically receives unencrypted data unless updated otherwise.
        
        **Key Files:**
        - **Trigger (USSD)**: `app/src/main/java/com/ibnux/smsgateway/layanan/UssdService.java` (Captures USSD dialogs, sends response)
        
        **Configuration:**
        - The URL for this endpoint is configured in the App under "Set USSD URL".
        - If "Set USSD URL" is empty, it falls back to the Primary Receiver URL.
      operationId: receiveUssdResponse
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                number:
                  type: string
                  description: Sender number or "ussd" (often includes SIM info like "*888#1").
                message:
                  type: string
                  description: The USSD response text.
                type:
                  type: string
                  description: Message type, always "ussd" for this endpoint.
                  enum: [ussd]
                timestamp:
                  type: string
                  description: Timestamp in milliseconds.
      responses:
        '200':
          description: USSD received successfully
        '400':
          description: Bad Request
        '500':
          description: Server Error

  /sms/backup:
    post:
      summary: Backup Receiver Endpoint (Stream B)
      description: |
        Receives a copy of *every* received SMS message.
        This stream bypasses all filters and encryption.
        
        **Key Files:**
        - **Trigger**: `app/src/main/java/com/ibnux/smsgateway/layanan/SmsListener.java`
        - **Sender**: `app/src/main/java/com/ibnux/smsgateway/layanan/BackupSendService.java` (Handles the network request)
      operationId: receiveBackupSms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsMessage'
      responses:
        '200':
          description: Backup received successfully
        '400':
          description: Bad Request
        '500':
          description: Server Error

components:
  schemas:
    EncryptedPayload:
      type: object
      properties:
        is_encrypted:
          type: boolean
          example: true
        payload:
          type: string
          description: Base64 encoded string containing IV + Encrypted Data + Tag.
          example: "VGhpcyBpcyBhbiBleGFtcGxlIGVuY3J5cHRlZCBwYXlsb2Fk..."

    UnencryptedPayload:
      type: object
      properties:
        is_encrypted:
          type: boolean
          example: false
        from:
          type: string
          example: "+1234567890"
        message:
          type: string
          example: "Hello World"
        type:
          type: string
          example: "received"
        timestamp:
          type: string
          example: "1678886400000"

    SmsMessage:
      type: object
      required:
        - from
        - message
        - type
        - timestamp
      properties:
        from:
          type: string
          description: The phone number of the sender.
          example: "+1234567890"
        message:
          type: string
          description: The content of the SMS message.
          example: "Hello, this is a test message."
        type:
          type: string
          description: The type of the message.
          enum: [received]
          example: "received"
        timestamp:
          type: string
          description: The timestamp of the message in milliseconds.
          example: "1678886400000"
