openapi: 3.0.3
info:
  title: Android SMS Gateway Forwarding API
  version: 2.0.0
  description: |
    Documentation for the endpoints that the Android SMS Gateway application calls to forward received SMS messages,
    and the endpoints a server uses to send commands back to the device.

    The application supports two streams for forwarding SMS:
    1. **Primary Receiver (Stream A)**: Encrypted forwarding with filtering capabilities and optional HMAC signing + Bearer auth.
    2. **Backup Receiver (Stream B)**: Raw forwarding of all messages without filters (optional) or encryption. Supports Bearer auth.

    **Sent/Delivery Status Reports**: When the app sends an SMS (triggered from server), it reports delivery status back
    through the Primary Receiver URL with `type: "sent"` or `type: "delivered"`.

servers:
  - url: https://your-server.com/api
    description: Example server URL

paths:
  /sms/send:
    post:
      summary: Send SMS or Initiate USSD (Server to App)
      description: |
        Triggers the Android device to send an SMS message OR initiate a USSD session via Firebase Cloud Messaging (FCM).
        This endpoint is handled by your custom backend which forwards the request to FCM.
        
        **Functionality:**
        1. **Send SMS**: Set `to` to a phone number and `text` to the message body.
        2. **Initiate USSD**: Set `to` to a USSD code (e.g., `*888#`). The `text` field is ignored.
        
        **Authentication:**
        The `secret` parameter must match the "Your Secret" generated by the app (a UUID v4),
        displayed in the Android App under Settings → Push & USSD Messaging.
      operationId: sendSmsFromDevice
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              required:
                - to
                - text
                - secret
                - deviceID
              properties:
                to:
                  type: string
                  description: Destination phone number OR USSD code (e.g., "*888#").
                text:
                  type: string
                  description: Message content (ignored for USSD).
                secret:
                  type: string
                  description: The "Your Secret" UUID displayed in the Android App.
                deviceID:
                  type: string
                  description: The FCM Token ("Your Device ID") displayed in the Android App.
                sim:
                  type: integer
                  description: SIM slot to use (1 or 2). Defaults to 0 (auto/default SIM).
                  default: 0
      responses:
        '200':
          description: Request processed (sent to FCM).
          content:
            text/plain:
              schema:
                type: string
                example: "{\"name\":\"projects/...\"}"

  /sms/receive:
    post:
      summary: Primary Receiver Endpoint (Stream A)
      description: |
        Receives filtered SMS messages and Sent/Delivered status reports. The format depends on the "Enable Encryption" setting in the app.
        
        **This endpoint handles four types of data:**
        1. **Received SMS** (`type: "received"`) — Incoming SMS forwarded from the device.
        2. **Sent Status** (`type: "sent"`) — Confirmation that an outgoing SMS was sent.
        3. **Delivered Status** (`type: "delivered"`) — Confirmation that an outgoing SMS was delivered.
        4. **USSD Response** (`type: "ussd"`) — USSD session results (e.g., balance check).
        
        **Key Files:**
        - **Trigger (SMS)**: `app/src/main/java/com/ibnux/smsgateway/layanan/SmsListener.java` (Captures SMS, applies filters, initiates upload)
        - **Trigger (Sent/Delivered)**: `app/src/main/java/com/ibnux/smsgateway/layanan/PushService.java` (Reports SMS send/delivery status)
        - **Encryption**: `app/src/main/java/com/ibnux/smsgateway/Utils/SecurityUtil.java` (Encrypts payload using AES-GCM)
        - **Signing**: `app/src/main/java/com/ibnux/smsgateway/layanan/PostQueueManager.java` (Adds HMAC-SHA256 signature header and Bearer token)
        
        **Mode 1: Encryption Enabled (Default)**
        - **Payload**: JSON Object with a single `payload` string. No `is_encrypted` field is sent.
        - **Encryption Algorithm**: AES/GCM/NoPadding (256-bit Key).
        - **Format**: Base64(IV + CipherText + Tag).
        
        **Mode 2: Encryption Disabled**
        - **Payload**: Raw JSON with `from`, `message`, `type`, and `timestamp` fields.
        - No `is_encrypted` field is sent.
        
        **HMAC-SHA256 Signature (Optional)**
        - When "Enable HMAC Signing" is toggled on in the Android app, every POST request includes an `X-Signature` header.
        - **Algorithm**: HMAC-SHA256 using a 256-bit key.
        - **Header**: `X-signature: <Base64-encoded HMAC-SHA256 digest of the raw request body>`
        - **Verification**: The backend recomputes the HMAC using its configured key and compares with `hash_equals()`. A mismatch returns 403 Forbidden.
        - **Backward Compatible**: When HMAC signing is disabled on the app, no header is sent and the backend processes requests normally.
        - **Error state**: If HMAC signing is enabled but the HMAC key is missing or signing fails, the POST is aborted (not sent).
        
        **Bearer Token Authentication (Optional)**
        - When "Bearer Token" is toggled on for Stream A, every POST request includes an `Authorization` header.
        - **Header**: `Authorization: Bearer <token>`
        - The token is a randomly generated string stored in EncryptedSharedPreferences.
      operationId: receivePrimarySms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              oneOf:
                - $ref: '#/components/schemas/EncryptedPayload'
                - $ref: '#/components/schemas/UnencryptedPayload'
            examples:
              encrypted-with-signature:
                summary: Encrypted payload with HMAC-SHA256 signature
                value:
                  payload: "VGhpcyBpcyBhbiBleGFtcGxlIGVuY3J5cHRlZCBwYXlsb2Fk..."
              unencrypted-with-signature:
                summary: Unencrypted payload (Received SMS)
                value:
                  from: "+1234567890"
                  message: "Hello World"
                  type: "received"
                  timestamp: "1678886400000"
              sent-status:
                summary: Sent status report
                value:
                  from: "+1234567890"
                  message: "success"
                  type: "sent"
                  timestamp: "1678886500000"
              delivered-status:
                summary: Delivered status report
                value:
                  from: "+1234567890"
                  message: "success"
                  type: "delivered"
                  timestamp: "1678886600000"
      responses:
        '200':
          description: Message received successfully
        '400':
          description: Bad Request
        '403':
          description: Forbidden — HMAC signature verification failed (X-Signature missing or invalid)
        '500':
          description: Server Error
      # Request headers (sent by the app to the server)
      headers:
        X-signature:
          description: HMAC-SHA256 signature of the raw request body (Base64). Sent when HMAC signing is enabled.
          schema:
            type: string
        Authorization:
          description: Bearer token for authentication. Sent when Bearer Token auth is enabled for Stream A.
          schema:
            type: string
            example: "Bearer <token>"

  /sms/ussd:
    post:
      summary: USSD Receiver Endpoint
      description: |
        Receives USSD responses (e.g., balance check results) from the device.
        This endpoint receives JSON payloads via the same `SmsListener.sendPOST()` method used for Primary SMS forwarding.
        
        **⚠️ Important:** Because USSD responses go through the same `sendPOST()` method as Stream A, the payload may be:
        - **Encrypted** (if AES-GCM encryption is enabled for Stream A)
        - **HMAC-signed** (if HMAC signing is enabled)
        - **Bearer-token-authenticated** (if Bearer auth is enabled)
        
        When encryption is enabled, the payload will be a wrapped JSON object:
        ```json
        {"payload": "BASE64_ENCODED_IV_CIPHERTEXT_TAG"}
        ```
        
        **Key Files:**
        - **Trigger (USSD)**: `app/src/main/java/com/ibnux/smsgateway/layanan/UssdService.java` (Captures USSD dialogs, sends response)
        
        **Configuration:**
        - The URL for this endpoint is configured in the App under "Set USSD URL".
        - If "Set USSD URL" is empty, it falls back to the Primary Receiver URL.
      operationId: receiveUssdResponse
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                from:
                  type: string
                  description: >
                    Sender indicator. When initiated from the USSD queue (PushService),
                    this includes the USSD code + SIM number (e.g., "*888#1").
                    When triggered without a queued session, this is "ussd".
                message:
                  type: string
                  description: The USSD response text.
                type:
                  type: string
                  description: Message type, always "ussd" for this endpoint.
                  enum: [ussd]
                timestamp:
                  type: string
                  description: Timestamp in milliseconds.
              example:
                from: "*888#1"
                message: "Your balance is $10.00"
                type: "ussd"
                timestamp: "1678886400000"
      responses:
        '200':
          description: USSD received successfully
        '400':
          description: Bad Request
        '403':
          description: Forbidden — HMAC signature verification failed (if HMAC is enabled)
        '500':
          description: Server Error

  /sms/backup:
    post:
      summary: Backup Receiver Endpoint (Stream B)
      description: |
        Receives a copy of *every* received SMS message.
        This stream bypasses all filters by default (optional setting to apply filters) and all encryption.
        Supports optional Bearer Token authentication.
        
        **Key Files:**
        - **Trigger**: `app/src/main/java/com/ibnux/smsgateway/layanan/SmsListener.java`
        - **Sender**: `app/src/main/java/com/ibnux/smsgateway/layanan/SmsListener.java` (via `PostQueueManager`)
        
        **Bearer Token Authentication (Optional)**
        - When "Bearer Token" is toggled on for Stream B, every POST request includes an `Authorization` header.
        - **Header**: `Authorization: Bearer <token>`
        - The token is a randomly generated string stored in EncryptedSharedPreferences.
      operationId: receiveBackupSms
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/SmsMessage'
      responses:
        '200':
          description: Backup received successfully
        '400':
          description: Bad Request
        '500':
          description: Server Error
      # Request headers (sent by the app to the server)
      headers:
        Authorization:
          description: Bearer token for authentication. Sent when Bearer Token auth is enabled for Stream B.
          schema:
            type: string
            example: "Bearer <token>"

components:
  schemas:
    EncryptedPayload:
      type: object
      properties:
        payload:
          type: string
          description: Base64 encoded string containing IV + Encrypted Data + Tag.
          example: "VGhpcyBpcyBhbiBleGFtcGxlIGVuY3J5cHRlZCBwYXlsb2Fk..."
      required:
        - payload

    UnencryptedPayload:
      type: object
      properties:
        from:
          type: string
          description: The phone number of the sender (for received/sent/delivered) or USSD code (for USSD responses).
          example: "+1234567890"
        message:
          type: string
          description: The content of the SMS message or status text ("success"/"failed" for sent/delivered).
          example: "Hello World"
        type:
          type: string
          description: The type of the message. Can be "received", "sent", "delivered", or "ussd".
          enum: [received, sent, delivered, ussd]
          example: "received"
        timestamp:
          type: string
          description: The timestamp of the message in milliseconds.
          example: "1678886400000"
      required:
        - from
        - message
        - type
        - timestamp

    SmsMessage:
      type: object
      required:
        - from
        - message
        - type
        - timestamp
      properties:
        from:
          type: string
          description: The phone number of the sender.
          example: "+1234567890"
        message:
          type: string
          description: The content of the SMS message.
          example: "Hello, this is a test message."
        type:
          type: string
          description: The type of the message.
          enum: [received]
          example: "received"
        timestamp:
          type: string
          description: The timestamp of the message in milliseconds.
          example: "1678886400000"